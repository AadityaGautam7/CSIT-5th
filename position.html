<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Positioning</title>
         <style>
            body {
                border: 2px solid black;
                height: 2000px; /* To enable scrolling for fixed position demonstration */
            }

            .box {
                width: 100px;
                height: 100px;
                display: inline-block;
                text-align: center;
                margin: 10px;
                position: relative;
                border: 2px solid black;
            }

            #box1 {
                background-color: lightblue;
                position: relative; /* Positioned relative to its normal position */
                top: 20px;
                left: 20px;
            }

            #box2 {
                background-color: lightcoral;
                position: static; /* Default position */
                top: 0px;
                left: 0px;
            }

            #box3 {
                background-color: lightgreen;
                position: fixed; /* Stays in the same place even when scrolling */
                top: 150px;
                bottom: 100px;
                left: 50px;
            }

            #box4 {
                background-color: lightgoldenrodyellow;
                position: absolute; /* Positioned relative to the nearest positioned ancestor */
                left: 20px;
                top: 100px;
            }

            #box5 {
                background-color: lightpink;
                position: sticky; /* Sticks to the top of the viewport when scrolled to its position */
                top: 0;
            }
        </style>
    </head>
    <body>
        <div class="box" id="box1">box1 [relative]</div>
        <div class="box" id="box2">box2 [static]</div>
        <div class="box" id="box3">box3 [fixed]</div>
        <div class="box" id="box4">box4 [absolute]</div>
        <div class="box" id="box5">box5 [sticky]</div>
    </body>
</html>
