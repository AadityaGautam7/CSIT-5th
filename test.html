<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test HTML Page</title>
    <style>
        .box {
            text-align: center;
            height: 2000px;
            border: 2px solid black;
            padding: 10px;
            margin-bottom: 20px;
        }
        #box1 {
            position: relative;
            margin: 20px;
            top: 10px;
            left: 10px;
            width: 100px;
            height: 100px;
            background-color: lightblue;
            border: 2px solid black;
        }

        #box2 {
            position: float;
            float: left;
            width: 100px;
            height: 100px;
            background-color: lightgreen;
            border: 2px solid black;
            margin-right: 10px;
        }

        #box3 {
            position: absolute;
            top: 150px;
            left: 150px;
            width: 100px;
            height: 100px;
            background-color: lightcoral;
            border: 2px solid black;
        }
    </style>
    </head>
    <body>
        <div class="box">
            <p id="box1">Relative positioning.</p>
            <p id="box2">Floating positioning.</p>
            <p id="box3">Absolute positioning.</p>
        </div>
</html>
