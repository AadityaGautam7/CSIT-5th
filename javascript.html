<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    </head>
<body>
    <h1>My first JavaScript.</h1>
    <script>
        let a = 10;
        var b = parseInt(prompt("Enter a number: "));
        let sum = a + b;
        console.log("The sum of " + a + " and " + b + " is " + sum + "<br>");   // Output to console
        document.write("The sum of " +a+" and "+b+" is "+sum+""); // Output to webpage
        alert("The sum  is " +sum); // Display alert box
    </script>
</body>
</html>
