<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Shadow</title>
    <style>
        h1 {
            text-shadow: 1px 2px 3px gray;   /* horizontal offset, vertical offset, blur radius, color */

        }
    </style>
</head>
<body>
    <h1>This is a heading with a red text shadow.</h1>
</body>
</html>
